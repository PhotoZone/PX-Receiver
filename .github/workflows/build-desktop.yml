name: Build Desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS Apple Silicon
            python: "3.11"
            artifact_name: px-receiver-macos-apple-silicon
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
            release_files: |
              release-assets/PX-Receiver-macOS-AppleSilicon.dmg
          - os: macos-13
            label: macOS Intel
            python: "3.11"
            artifact_name: px-receiver-macos-intel
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
            release_files: |
              release-assets/PX-Receiver-macOS-Intel.dmg
          - os: windows-2022
            label: Windows
            python: "3.11"
            artifact_name: px-receiver-windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            release_files: |
              release-assets/PX-Receiver-Windows-x64.msi
              release-assets/PX-Receiver-Windows-x64-setup.exe

    steps:
      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            app_version="${GITHUB_REF_NAME#v}"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            app_version="0.1.${GITHUB_RUN_NUMBER}"
            echo "tag=v${app_version}" >> "$GITHUB_OUTPUT"
            echo "name=Release v${app_version}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: npm install

      - name: Stamp app version
        run: npm run set:version -- ${{ steps.release_meta.outputs.app_version }}

      - name: Create worker virtualenv and install worker dependencies
        if: runner.os != 'Windows'
        run: |
          python -m venv worker/.venv
          worker/.venv/bin/python -m pip install --upgrade pip
          worker/.venv/bin/python -m pip install -e worker

      - name: Create worker virtualenv and install worker dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv worker/.venv
          worker/.venv/Scripts/python.exe -m pip install --upgrade pip
          worker/.venv/Scripts/python.exe -m pip install -e worker

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ matrix.label }}" = "macOS Apple Silicon" ]; then
            cp "src-tauri/target/release/bundle/dmg/"*.dmg "release-assets/PX-Receiver-macOS-AppleSilicon.dmg"
          elif [ "${{ matrix.label }}" = "macOS Intel" ]; then
            cp "src-tauri/target/release/bundle/dmg/"*.dmg "release-assets/PX-Receiver-macOS-Intel.dmg"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi release-assets/PX-Receiver-Windows-x64.msi
            cp src-tauri/target/release/bundle/nsis/*.exe release-assets/PX-Receiver-Windows-x64-setup.exe
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.release_meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.release_meta.outputs.tag }}" \
              --target "${{ github.sha }}" \
              --title "${{ steps.release_meta.outputs.name }}" \
              --generate-notes
          fi

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          while IFS= read -r file; do
            if [ -n "$file" ]; then
              gh release upload "${{ steps.release_meta.outputs.tag }}" "$file" --clobber
            fi
          done <<'EOF'
          ${{ matrix.release_files }}
          EOF
