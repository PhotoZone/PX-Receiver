name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS
            python: "3.11"
            artifact_name: px-receiver-macos
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
            release_files: |
              release-assets/PX-Receiver-macOS.dmg
          - os: windows-2022
            label: Windows
            python: "3.11"
            artifact_name: px-receiver-windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
            release_files: |
              release-assets/PX-Receiver-Windows-x64.msi
              release-assets/PX-Receiver-Windows-x64-setup.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: npm install

      - name: Create worker virtualenv and install worker dependencies
        if: runner.os != 'Windows'
        run: |
          python -m venv worker/.venv
          worker/.venv/bin/python -m pip install --upgrade pip
          worker/.venv/bin/python -m pip install -e worker

      - name: Create worker virtualenv and install worker dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv worker/.venv
          worker/.venv/Scripts/python.exe -m pip install --upgrade pip
          worker/.venv/Scripts/python.exe -m pip install -e worker

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Prepare release assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          mkdir -p release-assets
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp "src-tauri/target/release/bundle/dmg/"*.dmg "release-assets/PX-Receiver-macOS.dmg"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi release-assets/PX-Receiver-Windows-x64.msi
            cp src-tauri/target/release/bundle/nsis/*.exe release-assets/PX-Receiver-Windows-x64-setup.exe
          fi

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.release_files }}
          generate_release_notes: true
