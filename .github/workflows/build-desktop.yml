name: Build Desktop

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - codex/**
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    env:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            label: macOS Apple Silicon
            python: "3.11"
            artifact_name: px-receiver-macos-apple-silicon
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: macos-15-intel
            label: macOS Intel
            python: "3.11"
            artifact_name: px-receiver-macos-intel
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
          - os: windows-2022
            label: Windows
            python: "3.11"
            artifact_name: px-receiver-windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe

    steps:
      - name: Compute release metadata
        id: release_meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            app_version="${GITHUB_REF_NAME#v}"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=Release ${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            app_version="0.3.${GITHUB_RUN_NUMBER}"
            echo "tag=v${app_version}" >> "$GITHUB_OUTPUT"
            echo "name=Release v${app_version}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare macOS signing credentials
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        shell: bash
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/tauri-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Prepare App Store Connect API key
        if: runner.os == 'macOS' && env.APPLE_API_KEY != '' && env.APPLE_API_KEY_P8 != ''
        shell: bash
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install JavaScript dependencies
        run: npm install

      - name: Stamp app version
        run: npm run set:version -- ${{ steps.release_meta.outputs.app_version }}

      - name: Create worker virtualenv and install worker dependencies
        if: runner.os != 'Windows'
        run: |
          python -m venv worker/.venv
          worker/.venv/bin/python -m pip install --upgrade pip
          worker/.venv/bin/python -m pip install -e worker

      - name: Create worker virtualenv and install worker dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m venv worker/.venv
          worker/.venv/Scripts/python.exe -m pip install --upgrade pip
          worker/.venv/Scripts/python.exe -m pip install -e worker

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          export PUB_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          if [ "${{ matrix.label }}" = "macOS Apple Silicon" ]; then
            cp "src-tauri/target/release/bundle/dmg/"*.dmg "release-assets/PX-Receiver-macOS-AppleSilicon.dmg"
          elif [ "${{ matrix.label }}" = "macOS Intel" ]; then
            cp "src-tauri/target/release/bundle/dmg/"*.dmg "release-assets/PX-Receiver-macOS-Intel.dmg"
          elif [ "${{ runner.os }}" = "Windows" ]; then
            cp src-tauri/target/release/bundle/msi/*.msi release-assets/PX-Receiver-Windows-x64.msi
            cp src-tauri/target/release/bundle/nsis/*.exe release-assets/PX-Receiver-Windows-x64-setup.exe
          fi
          find src-tauri/target/release/bundle -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sig" \) -exec cp {} release-assets/ \;

          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path("release-assets")
          version = "${{ steps.release_meta.outputs.app_version }}"
          tag = "${{ steps.release_meta.outputs.tag }}"
          notes = "${{ steps.release_meta.outputs.name }}"
          pub_date = os.environ["PUB_DATE"]
          matrix_label = "${{ matrix.label }}"

          def build_manifest(asset_name: str, sig_name: str, platform_key: str, output_name: str) -> None:
              asset_path = root / asset_name
              sig_path = root / sig_name
              if not asset_path.exists() or not sig_path.exists():
                  raise SystemExit(f"Missing updater artifacts for {output_name}: {asset_name}, {sig_name}")

              manifest = {
                  "version": version,
                  "notes": notes,
                  "pub_date": pub_date,
                  "platforms": {
                      platform_key: {
                          "signature": sig_path.read_text(encoding="utf-8").strip(),
                          "url": f"https://github.com/PhotoZone/PX-Receiver/releases/download/{tag}/{asset_name}",
                      }
                  },
              }
              (root / output_name).write_text(json.dumps(manifest, indent=2) + "\n", encoding="utf-8")

          if matrix_label == "macOS Apple Silicon":
              asset = next(root.glob("*.app.tar.gz"), None)
              sig = next(root.glob("*.app.tar.gz.sig"), None)
              if asset and sig:
                  build_manifest(asset.name, sig.name, "darwin-aarch64", "latest-macos-apple-silicon.json")
          elif matrix_label == "macOS Intel":
              asset = next(root.glob("*.app.tar.gz"), None)
              sig = next(root.glob("*.app.tar.gz.sig"), None)
              if asset and sig:
                  build_manifest(asset.name, sig.name, "darwin-x86_64", "latest-macos-intel.json")
          elif matrix_label == "Windows":
              asset = next(root.glob("*.nsis.zip"), None) or next(root.glob("*.msi.zip"), None)
              sig = None
              if asset:
                  sig = root / f"{asset.name}.sig"
              if asset and sig and sig.exists():
                  build_manifest(asset.name, sig.name, "windows-x86_64", "latest-windows-x64.json")
          PY

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          path: ${{ matrix.artifact_path }}

      - name: Ensure GitHub release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.release_meta.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.release_meta.outputs.tag }}" \
              --target "${{ github.sha }}" \
              --title "${{ steps.release_meta.outputs.name }}" \
              --generate-notes
          fi

      - name: Publish GitHub release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for file in release-assets/*; do
            gh release upload "${{ steps.release_meta.outputs.tag }}" "$file" --clobber
          done
